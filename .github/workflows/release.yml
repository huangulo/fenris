name: Release Windows Agent

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: agent-windows/go.sum

      - name: Build Windows binaries
        working-directory: agent-windows
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            agent-windows/dist/fenris-agent-windows-amd64.exe
            agent-windows/dist/fenris-agent-windows-arm64.exe
            install-agent.ps1
