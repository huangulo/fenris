# FENRIS Configuration

server:
  port: 3200
  # Database URL - connects via internal Docker network
  # PostgreSQL is NOT exposed externally (security best practice)
  database_url: postgresql://fenris:${POSTGRES_PASSWORD:-fenris}@postgres:5432/fenris

# Metrics Collection
monitors:
  # System metrics (CPU, RAM, disk, network)
  system:
    enabled: true
    scrape_interval: 30s
    metrics:
      - cpu
      - memory
      - disk
      - network
  
  # Docker container monitoring (v0.2 feature, not MVP v0.1)
  docker:
    enabled: false  # Disabled for MVP v0.1
    scrape_interval: 15s  # How often to collect container stats
    include_stopped: false  # Include stopped containers

# Alert Configuration
alerts:
  # Discord webhook integration
  discord:
    enabled: true
    webhook_url: ${DISCORD_WEBHOOK_URL}  # Set via environment variable
    severity_levels:
      - info
      - warning
      - critical
  
  # Thresholds for alerting
  thresholds:
    cpu:
      warning: 75
      critical: 95
    memory:
      warning: 80
      critical: 90
    disk:
      warning: 85
      critical: 95
    network:
      # Network alerts based on anomaly detection only
      anomaly_threshold: 3.0  # Z-score threshold

# Disk Monitoring Configuration
# IMPORTANT: You MUST define which paths to monitor
disk_paths:
  - path: /
    name: root
    warning_threshold: 85
    critical_threshold: 95
  - path: /var/lib/docker
    name: docker-data
    warning_threshold: 80
    critical_threshold: 90
  - path: /var/log
    name: logs
    warning_threshold: 85
    critical_threshold: 95

# Anomaly Detection
anomaly_detection:
  enabled: true
  algorithm: zscore
  zscore_threshold: 3.5  # Raised from 3.0 — reduces false positives on memory and docker CPU
  window_size: 100  # Number of data points for baseline
  min_samples: 60  # Minimum samples before triggering alerts (~30 min of data at 30s)

# Predictive Alerting
predictions:
  enabled: true
  interval: "5m"              # How often to run predictions
  disk_horizon_days: 7        # Alert if disk full within this many days
  cpu_horizon_hours: 1        # Alert if CPU sustained high within this many hours
  memory_horizon_hours: 1     # Alert if memory sustained high within this many hours
  disk_threshold: 85          # % to predict breach for disk
  cpu_threshold: 90           # % to predict breach for CPU
  memory_threshold: 90        # % to predict breach for memory
  min_samples: 120            # Minimum data points for regression (~1 hr at 30s)
  min_confidence: 0.5         # Minimum R² to consider the trend reliable

# AI Incident Summaries (disabled by default — set api_key to enable)
ai:
  enabled: false
  provider: "openai"
  api_url: "https://api.openai.com/v1/chat/completions"
  api_key: ""                 # Set to your OpenAI API key
  model: "gpt-4o-mini"
  max_calls_per_hour: 10
  batch_window_ms: 120000     # 2 minutes — wait before summarising a batch
  cooldown_per_server_ms: 900000  # 15 minutes between summaries per server

# Data Retention
retention:
  metrics_days: 30  # Keep metrics for 30 days
  alerts_days: 90   # Keep alerts for 90 days

# Logging
logging:
  level: info
  file: /app/logs/fenris.log
  max_size: 100MB
  max_files: 5
