services:
  postgres:
    image: postgres:15-alpine
    container_name: fenris-postgres
    environment:
      POSTGRES_USER: fenris
      # WARNING: set POSTGRES_PASSWORD in your environment or a .env file before deploying
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_BEFORE_DEPLOY}
      POSTGRES_DB: fenris
    volumes:
      - fenris-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - fenris
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fenris']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fenris-server
    environment:
      - DATABASE_URL=postgresql://fenris:${POSTGRES_PASSWORD:-CHANGE_ME_BEFORE_DEPLOY}@postgres:5432/fenris
      - PORT=3200
      - NODE_ENV=production
    ports:
      - '3200:3200'
    group_add:
      - "${DOCKER_GID:-988}"
    volumes:
      - fenris-logs:/app/logs
      - fenris-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./fenris.yaml:/app/fenris.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fenris
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://127.0.0.1:3200/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_KEY: ${VITE_API_KEY:-088eef410ebc4caffb6e7bcf934530e022042d810fffe4d89caac3650164c774}
    container_name: fenris-web
    ports:
      - '8081:80'
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - fenris

  agent:
    build:
      context: ./agent
    environment:
      # Set HOST_IP to your host's LAN IP when the agent cannot auto-detect it
      # (e.g. when the host only has Docker bridge interfaces visible).
      # Example: HOST_IP=192.168.1.42
      HOST_IP: 100.90.129.230
    volumes:
      - ./agent-local/fenris-agent.yaml:/app/fenris-agent.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    group_add:
      - "${DOCKER_GID:-988}"
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - fenris

volumes:
  fenris-postgres-data:
  fenris-logs:
  fenris-data:

networks:
  fenris:
    driver: bridge
