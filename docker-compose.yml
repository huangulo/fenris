services:
  postgres:
    image: postgres:15-alpine
    container_name: fenris-postgres
    environment:
      POSTGRES_USER: fenris
      # WARNING: set POSTGRES_PASSWORD in your environment or a .env file before deploying
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_BEFORE_DEPLOY}
      POSTGRES_DB: fenris
    volumes:
      - fenris-postgres-data:/var/lib/postgresql/data
    networks:
      - fenris
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U fenris']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: fenris-server
    environment:
      - DATABASE_URL=postgresql://fenris:${POSTGRES_PASSWORD:-CHANGE_ME_BEFORE_DEPLOY}@postgres:5432/fenris
      - PORT=3200
      - NODE_ENV=production
    ports:
      - '3200:3200'
    group_add:
      - "${DOCKER_GID:-988}"
    volumes:
      - fenris-logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fenris
    healthcheck:
      test: ['CMD', 'wget', '--spider', '--quiet', '--tries=1', '--timeout=5', 'http://localhost:3200/health']
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_KEY: ${VITE_API_KEY:-local-default-key}
    container_name: fenris-web
    ports:
      - '8081:80'
    depends_on:
      - server
    networks:
      - fenris

  # ---------------------------------------------------------------------------
  # agent (example — uncomment to run an agent on the same host as the server)
  #
  # For remote hosts: copy the agent/ directory, build the image, and run it
  # with the environment variables below pointing at this server.
  # See README.md → "Deploying the agent on a remote host" for details.
  # ---------------------------------------------------------------------------
  # agent:
  #   build:
  #     context: ./agent
  #     dockerfile: Dockerfile
  #   container_name: fenris-agent-local
  #   environment:
  #     - FENRIS_SERVER_URL=http://server:3200
  #     - FENRIS_API_KEY=${AGENT_API_KEY:-local-agent-key}
  #     - FENRIS_SERVER_NAME=${AGENT_SERVER_NAME:-docker-host}
  #     - FENRIS_COLLECT_INTERVAL=30s
  #     - FENRIS_DOCKER_ENABLED=true
  #   group_add:
  #     - "${DOCKER_GID:-988}"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   depends_on:
  #     server:
  #       condition: service_healthy
  #   networks:
  #     - fenris
  #   restart: unless-stopped

volumes:
  fenris-postgres-data:
  fenris-logs:

networks:
  fenris:
    driver: bridge
